<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHANNEL ZERO - CRT Tuner</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <button class="challenge-toggle" id="challengeToggle">
      <span class="toggle-icon">⚡</span>
      <span class="toggle-label">挑战模式</span>
    </button>

    <div class="challenge-panel" id="challengePanel">
      <div class="challenge-header">
        <h3>限时搜台挑战</h3>
        <div class="challenge-controls">
          <label>
            难度:
            <select id="difficultySelect">
              <option value="easy">简单 (60s)</option>
              <option value="medium" selected>中等 (45s)</option>
              <option value="hard">困难 (30s)</option>
            </select>
          </label>
          <button class="start-btn" id="startChallengeBtn">开始挑战</button>
        </div>
      </div>

      <div class="challenge-status">
        <div class="challenge-round" id="roundText"></div>
        <div class="challenge-timer" id="timerText">0:00</div>
      </div>

      <div class="challenge-hint">
        <div class="hint-label">目标提示</div>
        <div class="hint-text" id="hintText">点击开始挑战</div>
      </div>

      <div class="result-panel" id="resultPanel">
        <div class="result-status" id="resultStatus">✓ CHANNEL LOCKED</div>
        <div class="result-item" id="resultTime">用时: 0:00</div>
        <div class="result-item" id="resultStrength">最高强度: 0%</div>
        <div class="result-item" id="resultDeviation">偏差: VHF 0 | UHF 0 | ANT 0°</div>
        <div class="result-buttons">
          <button class="result-btn next" id="nextRoundBtn">下一轮</button>
          <button class="result-btn close" id="closeResultBtn">关闭</button>
        </div>
      </div>
    </div>

    <div class="tv-frame">
      <div class="tv-screen-container">
        <canvas id="glCanvas"></canvas>
        <div class="screen-glare"></div>
        <div class="scanlines"></div>
        <div id="signalOverlay" class="signal-overlay">
          <div class="signal-name"></div>
          <div class="signal-description"></div>
          <div class="binary-stream"></div>
        </div>
      </div>
      
      <div class="tv-body">
        <div class="brand-label">CHANNEL ZERO</div>
        
        <div class="controls-panel">
          <div class="knob-group">
            <div class="knob-label">VHF</div>
            <div class="knob" id="vhfKnob" data-param="vhf">
              <div class="knob-mark"></div>
            </div>
            <div class="knob-value" id="vhfValue">000</div>
          </div>
          
          <div class="knob-group">
            <div class="knob-label">UHF</div>
            <div class="knob" id="uhfKnob" data-param="uhf">
              <div class="knob-mark"></div>
            </div>
            <div class="knob-value" id="uhfValue">000</div>
          </div>
          
          <div class="knob-group">
            <div class="knob-label">ANTENNA</div>
            <div class="knob" id="antennaKnob" data-param="antenna">
              <div class="knob-mark"></div>
            </div>
            <div class="knob-value" id="antennaValue">000°</div>
          </div>
        </div>
        
        <div class="status-bar">
          <div class="signal-meter">
            <div class="signal-meter-label">SIGNAL</div>
            <div class="signal-meter-bar">
              <div class="signal-meter-fill" id="signalFill"></div>
            </div>
          </div>
          <div class="weather-indicator">
            <span class="weather-icon">⛈</span>
            <span class="weather-label">STORM</span>
          </div>
          <button class="power-button" id="audioToggle">
            <span class="power-icon">◉</span>
            <span class="power-label">AUDIO</span>
          </button>
        </div>
        
        <div class="instructions">
          <div>Drag knobs to tune • Scroll to fine-tune</div>
          <div id="foundCount">Signals found: 0 / 4</div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
